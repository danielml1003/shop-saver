name: Security checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1" # weekly, Monday early morning

jobs:
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so old commits are scanned too
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust-audit:
    name: Rust dependency audit (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # RUSTSEC-2023-0071 (rsa, Marvin timing attack): no fixed version exists, and
      # rsa only enters Cargo.lock via sqlx's *MySQL* driver — this project compiles
      # the Postgres driver only, so the crate is never built (cargo tree -i rsa is empty).
      - run: cargo audit --ignore RUSTSEC-2023-0071
        working-directory: backend

  node-audit:
    name: Node dependency audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # --omit=dev: audit what ships to users. The app is a static bundle served
      # by nginx; react-scripts/webpack (devDependencies) never run in production
      # and CRA's toolchain carries known-unfixable advisories.
      - run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

  python-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx run pip-audit -r requirements.txt
