services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shop_saver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shop_saver"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/shop_saver
      WATCH_DIRECTORY: /downloads
      RUST_LOG: info
    volumes:
      - downloads:/downloads
    # Not exposed externally — nginx proxies /api/ to this container

  service:
    build:
      context: .
      dockerfile: service/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/shop_saver
      # keeps manual `docker compose exec service python3 main.py` runs writing
      # into the volume the API watches (cron jobs set this in /etc/cron.d)
      DOWNLOAD_DIR: /app/downloads
    volumes:
      - downloads:/app/downloads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  pgdata:
  downloads:
